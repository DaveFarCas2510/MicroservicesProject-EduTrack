name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build and test
        run: ./mvnw verify -B

  course-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: course-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build and test
        run: ./mvnw verify -B

  enrollment-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enrollment-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build and test
        run: ./mvnw verify -B

  api-gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven
      - name: Build and test
        run: ./mvnw verify -B

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edutrack-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: edutrack-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
