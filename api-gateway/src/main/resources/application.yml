server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 120000
        response-timeout: 120s
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "https://*.vercel.app"
              - "https://*.onrender.com"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**

        - id: course-service
          uri: ${COURSE_SERVICE_URI:http://course-service:8082}
          predicates:
            - Path=/api/courses/**, /api/lessons/**, /api/categories/**

        - id: enrollment-service
          uri: ${ENROLLMENT_SERVICE_URI:http://enrollment-service:8083}
          predicates:
            - Path=/api/enrollments/**

        - id: course-uploads
          uri: ${COURSE_SERVICE_URI:http://course-service:8082}
          predicates:
            - Path=/uploads/**

jwt:
  secret: ${JWT_SECRET:mi-clave-secreta-para-desarrollo-local-minimo-32-chars}