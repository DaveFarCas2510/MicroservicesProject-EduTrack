server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      httpclient:
        connect-timeout: 120000
        response-timeout: 120s
        follow-redirects: true
        ssl:
          use-insecure-trust-manager: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**

        - id: course-service
          uri: ${COURSE_SERVICE_URI:http://course-service:8082}
          predicates:
            - Path=/api/courses/**, /api/lessons/**, /api/categories/**

        - id: enrollment-service
          uri: ${ENROLLMENT_SERVICE_URI:http://enrollment-service:8083}
          predicates:
            - Path=/api/enrollments/**

        - id: course-uploads
          uri: ${COURSE_SERVICE_URI:http://course-service:8082}
          predicates:
            - Path=/uploads/**

jwt:
  secret: ${JWT_SECRET:mi-clave-secreta-para-desarrollo-local-minimo-32-chars}